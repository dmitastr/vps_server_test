services:
  app:
    build: .
    container_name: echo-server
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - internal
    # порт наружу не открываем — идём через nginx
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - echo-server
    networks:
      - internal

networks:
  internal:
